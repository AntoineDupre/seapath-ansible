---
- name: Disable vim defaults
  lineinfile:
    dest: "{{ vimrc_path }}"
    regexp: '^"? *let g:skip_defaults_vim = 1$'
    line: "let g:skip_defaults_vim = 1"
    state: present
- name: Vim color syntax
  lineinfile:
    dest: "{{ vimrc_path }}"
    regexp: '^"? *syntax on$'
    line: "syntax on"
    state: present
- name: Remove vimrc.local file
  file:
    path: "{{ vimrc_path }}.local"
    state: absent
