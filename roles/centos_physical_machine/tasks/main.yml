- name: Configure sysctl rules
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: sysctl.yml

- name: Configure common setup
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: common_setup.yml

- name: Copy Pacemaker Seapath Resource-Agent files
  ansible.posix.synchronize:
    src: pacemaker_ra/
    dest: /usr/lib/ocf/resource.d/seapath/
    rsync_opts:
    - "--chmod=F755"
    - "--chown=root:root"

- name: Configure chrony-wait
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: chrony_wait.yml

- name: Configure pacemaker service
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: pacemaker.yml
  vars:
    common_physical_machine_check_service_exists: true

- name: Add extra modules to the kernel
  block:
    - name: Create extra modules conf file
      ansible.builtin.file:
        path: /etc/modules-load.d/extra_modules.conf
        owner: root
        group: root
        mode: 0751
        state: touch
    - name: Add extra modules to conf file
      lineinfile:
        dest: /etc/modules-load.d/extra_modules.conf
        state: present
        regexp: "^{{ item }}$"
        line: "{{ item }}"
      with_items: "{{ extra_kernel_modules | default([]) }}"

- name: Add br_netfilter to /etc/modules-load.d
  ansible.builtin.copy:
    src: modules/netfilter.conf
    dest: /etc/modules-load.d/netfilter.conf
    owner: root
    group: root
    mode: 0751

- name: Configure logstash
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: logstash.yml

- name: Configure libvirt
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: libvirt.yml

- name: Enable virtsecretd
  ansible.builtin.systemd:
    name: virtsecretd.service
    enabled: yes
    state: started

- name: "Add initramfs-tools scripts: script file (LVM rebooter and log handling)"
  ansible.builtin.copy:
    src: initramfs-tools/scripts/
    dest: /etc/initramfs-tools/scripts/
    mode: '0755'
  notify: Rebuild initramfs if necessary

- name: Get the /var/log/ device
  command: "findmnt -n -o SOURCE --target /var/log"
  register: centos_physical_machine_varlog_dev
  changed_when: false

- name: Set_fact /var/log/ device
  set_fact:
    centos_physical_machine_lvm_rebooter_log_device: "{{ centos_physical_machine_varlog_dev.stdout }}"

- name: Get the /var/log/ relative path
  shell: "realpath --relative-to=$(findmnt -n -o TARGET --target /var/log/) /var/log"
  register: centos_physical_machine_varlog_path
  changed_when: false

- name: Set_fact /var/log/ relative path
  set_fact:
    centos_physical_machine_lvm_rebooter_log_path: "{{ centos_physical_machine_varlog_path.stdout }}"

- name: Copy rebooter.conf # noqa: risky-file-permissions
  template:
    src: initramfs-tools/conf.d/rebooter.conf.j2
    dest: /etc/dracut.conf.d/rebooter.conf

- name: Configure initramfs-tools to use busybox
  lineinfile:
    dest: /etc/dracut.conf
    regexp: "^#?BUSYBOX="
    line: "BUSYBOX=y"
    state: present
  notify: Rebuild initramfs if necessary

- name: Add rbd type to lvm.conf
  ansible.builtin.lineinfile:
    path: /etc/lvm/lvm.conf
    insertafter: 'devices {'
    line: "        types = [ \"rbd\", 1024 ]"
    state: present

- name: Configure firewalld for ceph
  block:
    - name: "Configure firewalld for ceph monitor"
      ansible.posix.firewalld:
        port: 3300/tcp
        permanent: true
        state: enabled
    - name: "Configure firewalld for ceph monitor legacy v1 port"
      ansible.posix.firewalld:
        port: 6789/tcp
        permanent: true
        state: enabled
    - name: "Configure firewalld for ceph OSD"
      ansible.posix.firewalld:
        port: 6800-7300/tcp
        permanent: true
        state: enabled

- name: Configure firewalld for high-availability services
  ansible.posix.firewalld:
    service: high-availability
    permanent: true
    state: enabled

- name: Configure ovs-vswitchd
  ansible.builtin.include_role:
    name: common_physical_machine
    tasks_from: ovs_vswitchd.yml
