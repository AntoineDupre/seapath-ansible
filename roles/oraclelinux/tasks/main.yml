---

- name: Stop and Disable firewalld
  service:
    name: firewalld
    state: stopped
    enabled: no

- name: Configure vim
  ansible.builtin.include_role:
    name: common_base
    tasks_from: vim.yml

- name: Configure syslog-ng
  ansible.builtin.include_role:
    name: common_base
    tasks_from: syslog.yml

- name: Configure admin user
  ansible.builtin.include_role:
    name: common_base
    tasks_from: admin_user.yml

- name: Configure journald
  ansible.builtin.include_role:
    name: common_base
    tasks_from: journald.yml

- name: Configure sysctl
  ansible.builtin.include_role:
    name: common_base
    tasks_from: sysctl.yml

- name: Configure environment
  ansible.builtin.include_role:
    name: common_base
    tasks_from: environment.yml

- name: Configure PATH for admin user
  ansible.builtin.include_role:
    name: common_base
    tasks_from: path_config.yml

- name: Remove quiet from GRUB_CMDLINE_LINUX_DEFAULT option in grub conf
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX_DEFAULT=\")(.*?[ ])?quiet([ ].*)?(\")$"
    line: '\1\2\3\4'
    backrefs: yes
  notify: Update-grub

- name: Make sure GRUB_CMDLINE_LINUX_DEFAULT has no double space
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX_DEFAULT=\".*)[ ][ ](.*\")"
    line: '\1 \2'
    state: present
    backrefs: yes
  register: oraclelinux_doublespace
  until: not oraclelinux_doublespace.changed
  delay: 1
  retries: 10

- name: Make sure GRUB_CMDLINE_LINUX exists 1/2
  lineinfile:
    path: /etc/default/grub
    regexp: "^GRUB_CMDLINE_LINUX=\".*\""
    state: absent
  check_mode: true
  changed_when: false
  register: oraclelinux_check_grub_cmdline_linux

- name: Make sure GRUB_CMDLINE_LINUX exists 2/2
  lineinfile:
    path: /etc/default/grub
    state: present
    line: "GRUB_CMDLINE_LINUX=\" \""
  when: oraclelinux_check_grub_cmdline_linux.found == 0

- name: Make sure GRUB_CMDLINE_LINUX starts with a space
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=)\"([ ]*)(.*)\""
    line: '\1" \3"'
    state: present
    backrefs: yes

- name: Make grub conf
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=(?!.* {{ item }})\"[^\"]*)(\".*)"
    line: '\1 {{ item }}\2'
    state: present
    backrefs: yes
  notify: Update-grub
  with_items:
    - ipv6.disable=1
    - efi=runtime
    - fsck.mode=force
    - fsck.repair=yes
    - "{{ grub_append | default([]) }}"

- name: Grub conf osprober
  lineinfile:
    dest: /etc/default/grub
    regexp: '^#?GRUB_DISABLE_OS_PROBER=.*$'
    line: 'GRUB_DISABLE_OS_PROBER=true'
    state: present
  notify: Update-grub

- name: Stop and Disable NetworkManager
  service:
    name: NetworkManager
    state: stopped
    enabled: no

- name: Start and Enable systemd-networkd
  service:
    name: systemd-networkd
    state: started
    enabled: yes
