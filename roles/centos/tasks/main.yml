---
- name: Configure vim
  ansible.builtin.include_role:
    name: common_base
    tasks_from: vim.yml

- name: Configure syslog-ng
  ansible.builtin.include_role:
    name: common_base
    tasks_from: syslog.yml

- name: Configure journald
  ansible.builtin.include_role:
    name: common_base
    tasks_from: journald.yml

- name: Configure admin user
  ansible.builtin.include_role:
    name: common_base
    tasks_from: admin_user.yml
  vars:
    common_base_remove_old_admin: false

- name: Configure sysctl
  ansible.builtin.include_role:
    name: common_base
    tasks_from: sysctl.yml

- name: Configure environment
  ansible.builtin.include_role:
    name: common_base
    tasks_from: environment.yml

- name: Configure PATH for admin user
  ansible.builtin.include_role:
    name: common_base
    tasks_from: path_config.yml

- name: Remove GRUB_CMDLINE_LINUX_DEFAULT option in grub conf
  lineinfile:
    dest: /etc/default/grub
    regexp: "^GRUB_CMDLINE_LINUX_DEFAULT="
    state: absent

- name: Make sure GRUB_CMDLINE_LINUX starts with a space
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=)\"([ ]*)(.*)\""
    line: '\1" \3"'
    state: present
    backrefs: yes

- name: Grub conf
  lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=(?!.* {{ item }})\"[^\"]*)(\".*)"
    line: '\1 {{ item }}\2'
    state: present
    backrefs: yes
  notify: Update Grub
  with_items:
    - ipv6.disable=1
    - efi=runtime
    - fsck.mode=force
    - fsck.repair=yes
    - "{{ grub_append | default([]) }}"

- name: Grub conf osprober
  lineinfile:
    dest: /etc/default/grub
    regexp: '^#?GRUB_DISABLE_OS_PROBER=.*$'
    line: 'GRUB_DISABLE_OS_PROBER=true'
    state: present
  notify: Update Grub

- name: Stop and Disable NetworkManager
  service:
    name: NetworkManager
    state: stopped
    enabled: no
  register: centos_nm_stop

- name: Start and Enable systemd-networkd
  service:
    name: systemd-networkd
    state: started
    enabled: yes
  register: centos_sd_start

- name: Set need_reboot to true if any change was made
  set_fact:
    need_reboot: true # noqa: var-naming[no-role-prefix]
  when: centos_nm_stop is changed or centos_sd_start is changed
