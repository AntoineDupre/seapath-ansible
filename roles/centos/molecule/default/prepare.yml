---
- name: Prepare
  hosts: all
  gather_facts: true
  tasks:
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - vim-enhanced
        state: present

    - name: Ensure /etc/syslog-ng directory exists
      ansible.builtin.file:
        path: /etc/syslog-ng
        state: directory
        mode: "0755"

    - name: Pre-copy syslog-ng.conf to prevent handler trigger
      ansible.builtin.template:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../common_base/templates/syslog-ng.conf.j2"
        dest: /etc/syslog-ng/syslog-ng.conf
        mode: "0644"

    - name: Create /var/log/syslog-ng directory
      ansible.builtin.file:
        path: /var/log/syslog-ng
        state: directory
        mode: "0755"

    - name: Pre-copy journald.conf to prevent handler trigger
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../common_base/files/journald.conf"
        dest: /etc/systemd/journald.conf
        mode: "0644"

    - name: Create /etc/default directory
      ansible.builtin.file:
        path: /etc/default
        state: directory
        mode: "0755"

    - name: Create /etc/default/grub with default content
      ansible.builtin.copy:
        dest: /etc/default/grub
        content: |
          GRUB_DEFAULT=0
          GRUB_TIMEOUT=5
          GRUB_CMDLINE_LINUX_DEFAULT="quiet"
          GRUB_CMDLINE_LINUX=""
        mode: "0644"

    - name: Create mock grub2-mkconfig command
      ansible.builtin.copy:
        dest: /usr/sbin/grub2-mkconfig
        content: |
          #!/bin/bash
          exit 0
        mode: "0755"

    - name: Create mock NetworkManager service
      ansible.builtin.copy:
        dest: /etc/systemd/system/NetworkManager.service
        content: |
          [Unit]
          Description=Mock NetworkManager
          [Service]
          Type=oneshot
          ExecStart=/bin/true
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Reload systemd and start mock NetworkManager
      ansible.builtin.systemd:
        daemon_reload: true
        name: NetworkManager.service
        state: started
        enabled: true
      failed_when: false

    - name: Ensure systemd-networkd is available
      ansible.builtin.systemd:
        name: systemd-networkd.service
        enabled: false
      failed_when: false
