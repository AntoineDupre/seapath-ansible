---
- name: Trigger daemon-reload
  ansible.builtin.service:
    daemon_reload: yes

- name: Restart systemd-sysctl
  ansible.builtin.systemd:
    name: systemd-sysctl.service
    state: restarted

- name: Restart ovs-vswitchd
  ansible.builtin.systemd:
    state: restarted
    daemon_reload: yes
    name: ovs-vswitchd
