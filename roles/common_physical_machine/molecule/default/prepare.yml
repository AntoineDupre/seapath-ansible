---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure /etc/libvirt directory exists
      ansible.builtin.file:
        path: /etc/libvirt
        state: directory
        mode: "0755"

    - name: Create mock libvirtd.conf
      ansible.builtin.copy:
        dest: /etc/libvirt/libvirtd.conf
        content: |
          #host_uuid_source = "smbios"
        mode: "0644"

    - name: Pre-copy chrony-wait.service to prevent handler trigger
      ansible.builtin.template:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/templates/chrony-wait.service.j2"
        dest: /etc/systemd/system/chrony-wait.service
        owner: root
        group: root
        mode: "0644"

    - name: Pre-create pacemaker.service.d directory and override
      ansible.builtin.file:
        path: /etc/systemd/system/pacemaker.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Pre-copy pacemaker override to prevent handler trigger
      ansible.builtin.template:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/templates/pacemaker_override.conf.j2"
        dest: /etc/systemd/system/pacemaker.service.d/override.conf
        owner: root
        group: root
        mode: "0644"

    - name: Pre-create ovs-vswitchd.service.d directory
      ansible.builtin.file:
        path: /etc/systemd/system/ovs-vswitchd.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Pre-copy ovs-vswitchd override to prevent handler trigger
      ansible.builtin.template:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/templates/ovs-vswitchd_override.conf.j2"
        dest: /etc/systemd/system/ovs-vswitchd.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
      vars:
        team0_0: eth0
        team0_1: eth1

    - name: Pre-copy team0_x@.service to prevent handler trigger
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/files/team0_x@.service"
        dest: /etc/systemd/system/team0_x@.service
        owner: root
        group: root
        mode: "0644"

    - name: Pre-copy 00-bridge_nf_call.conf to prevent handler trigger
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/files/00-bridge_nf_call.conf"
        dest: /etc/sysctl.d/00-bridge_nf_call.conf
        mode: "0644"
